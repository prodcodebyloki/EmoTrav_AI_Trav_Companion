name: Deploy Web to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"

env:
  PROJECT_ID: loki-warm-up-challenge
  REGION: us-central1
  SERVICE: emotrav-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source apps/web \
            --region $REGION \
            --project $PROJECT_ID \
            --allow-unauthenticated \
            --set-build-env-vars NEXT_PUBLIC_API_URL=https://emotrav-api-620175114461.us-central1.run.app \
            --set-env-vars NEXT_PUBLIC_API_URL=https://emotrav-api-620175114461.us-central1.run.app \
            --min-instances 0 \
            --max-instances 5 \
            --memory 512Mi \
            --timeout 60
